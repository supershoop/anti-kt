<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>anti-kt monitor</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="monitor">
        <div class="video-wrap">
          <canvas id="canvas" width="640" height="480"></canvas>
          <div id="status" class="status clear">All clear</div>
        </div>
        <aside class="panel">
          <h1>Exam monitor</h1>
          <div id="connection" class="connection">Connecting</div>
          <div id="top-label" class="top-label">Waiting for camera</div>
          <div id="runtime-message" class="runtime-message">Click Start camera</div>
          <div id="predictions" class="predictions"></div>
          <button id="start" type="button">Start camera</button>
        </aside>
      </section>
    </main>

    <script src="/vendor/tf.min.js"></script>
    <script src="/vendor/teachablemachine-pose.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
